name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Lint, Type-check, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # Provide stub values so env validation passes during CI build
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          AUTH_SECRET: ci-stub-secret-that-is-long-enough-for-validation
          KV_REST_API_URL: https://stub.upstash.io
          KV_REST_API_TOKEN: stub-token
